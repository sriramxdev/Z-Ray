<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Z-Ray Medical Imaging Platform — Secure login" />
  <title>Z-Ray | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <a href="index.html" class="brand" id="siteBrand">
      <span class="dot"></span>
      Z-Ray
    </a>
  </header>

  <!-- ===== Login Page ===== -->
  <main class="login-page">
    <div class="login-card" id="loginCard">

      <h1 class="login-card__title">Welcome Back</h1>
      <p class="login-card__subtitle">Sign in to your Z-Ray account</p>

      <!-- Error message -->
      <div class="error-message" id="errorMessage" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
      </div>

      <form id="loginForm" autocomplete="on">

        <!-- Username -->
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            spellcheck="false"
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>

      </form>

      <div class="login-links" style="text-align:center; margin-top:20px; font-size:14px;">
        <p>New user? <a href="register.html" style="color:var(--primary-color); text-decoration:none; font-weight:500;">Create an account</a></p>
      </div>

      <p class="login-footer" style="margin-top:16px;">© 2026 Z-Ray Medical Platform</p>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
