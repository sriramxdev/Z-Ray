<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Ray | History</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="dashboard-header">
    <a href="dashboard.html" class="brand"><span class="dot"></span> Z-Ray</a>
    <div class="header-right">
      <span class="header-user" id="headerUser"></span>
      <button class="btn-logout" id="btnLogout">Sign Out</button>
    </div>
  </header>

  <div class="app-layout">
    <nav class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="sidebar-label">Dashboard</span>
        </a></li>
        <li><a href="xray.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M9 16h6"/></svg>
          <span class="sidebar-label">X-Ray Analysis</span>
        </a></li>
        <li><a href="ecg.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,14 6,14 8,6 12,20 14,10 16,14 22,14"/></svg>
          <span class="sidebar-label">ECG Analysis</span>
        </a></li>
      </ul>
      <ul class="sidebar-nav sidebar-bottom">
        <li><a href="history.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span class="sidebar-label">History</span>
        </a></li>
        <li><a href="about.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span class="sidebar-label">About</span>
        </a></li>
        <li><a href="documentation.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          <span class="sidebar-label">Documentation</span>
        </a></li>
      </ul>
    </nav>

    <main class="page-content">
      <h1 class="page-title">Analysis History</h1>
      <p class="page-subtitle">Complete log of all past medical analyses.</p>

      <div class="weekly-report">
        <div class="report-header">
          <h2>All Records</h2>
          <span class="report-period">Last 30 days</span>
        </div>
        <div class="report-table-wrap">
          <table class="report-table">
            <thead>
              <tr><th>Date</th><th>Patient ID</th><th>Type</th><th>Diagnosis</th><th>Confidence</th><th>Status</th></tr>
            </thead>
            <tbody id="historyTableBody">
              <!-- Dynamically populated -->
              <tr><td colspan="6" style="text-align:center; padding: 20px;">Loading records...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!requireAuth()) return;
      setupHeader();
      loadHistory();
    });

    async function loadHistory() {
      const tbody = document.getElementById('historyTableBody');
      try {
        const data = await apiRequest('/api/records?limit=50&offset=0');
        const records = data.records;
        
        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-light)">No records found.</td></tr>';
          return;
        }

        tbody.innerHTML = records.map(r => {
          const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          const typeMap = { 'xray': 'X-Ray', 'ecg': 'ECG' };
          const tLabel = typeMap[r.analysis_type] || r.analysis_type;
          
          let confStr = r.confidence ? r.confidence.toFixed(1) + '%' : 'N/A';
          let diagStr = r.diagnosis || 'Pending';
          let statusHtml = '<span class="status status-done">Completed</span>';
          
          return `
            <tr>
              <td>${date}</td>
              <td>${r.patient_id}</td>
              <td><span class="tag tag-${r.analysis_type}">${tLabel}</span></td>
              <td>${diagStr}</td>
              <td>${confStr}</td>
              <td>${statusHtml}</td>
            </tr>
          `;
        }).join('');

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--red-500)">Error loading records: ${err.message}</td></tr>`;
      }
    }
  </script>
</body>
</html>
